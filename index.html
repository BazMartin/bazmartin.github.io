<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSCS · MDC REPORT</title>
  <!-- Inter - clean, technical font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1e24;  /* dark grey-black - MDC background */
      color: #e5e9f0;        /* light grey text */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* SIMPLIFIED HEADER - no white */
    header {
      background: #23282e;  /* dark grey */
      padding: 12px 24px;
      border-bottom: 3px solid #f39c12;  /* orange accent */
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 1.8rem;
      color: #f39c12;
    }

    .logo-text h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .logo-text .badge {
      display: none;  /* simplified - removed */
    }

    .report-ref {
      background: #2d343b;  /* medium grey */
      padding: 6px 16px;
      border-radius: 6px;   /* slight rounding only */
      border-left: 4px solid #f39c12;
      font-weight: 500;
      color: #ffffff;
      font-size: 1rem;
      font-family: 'Inter', monospace;
    }

    .report-ref i {
      color: #f39c12;
      margin-right: 6px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* MDC CARD - squared, technical */
    .action-card {
      background: #23282e;  /* dark grey card, no white */
      width: 100%;
      max-width: 1200px;
      border-radius: 8px;    /* minimal rounding */
      border: 1px solid #3a424a;
      border-top: 4px solid #f39c12;  /* orange top accent */
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      padding: 28px 32px;
    }

    .form-header {
      margin-bottom: 24px;
      border-left: 4px solid #f39c12;
      padding-left: 16px;
    }

    .form-header h2 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-header h2 i {
      color: #f39c12;
      font-size: 1.8rem;
    }

    .form-header p {
      color: #a0a8b3;  /* lighter grey */
      margin-top: 4px;
      font-size: 0.95rem;
    }

    .form-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* FIELD ROWS - squared, grey on grey */
    .field-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: #2d343b;  /* medium grey */
      padding: 8px 16px 8px 12px;
      border-radius: 6px;    /* subtle rounding */
      border: 1px solid #3f4852;
      transition: 0.1s;
    }
    .field-row:focus-within {
      border-color: #f39c12;
      box-shadow: 0 0 0 1px #f39c12;
    }

    .field-row label {
      font-weight: 500;
      font-size: 0.9rem;
      min-width: 140px;
      color: #cbd5e0;  /* light grey */
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .field-row label i {
      width: 20px;
      color: #f39c12;
      font-size: 1rem;
    }

    .field-row input,
    .field-row select,
    .field-row textarea {
      flex: 1;
      min-width: 240px;
      background: #1e242a;  /* darker grey */
      border: 1px solid #3f4852;
      border-radius: 4px;    /* minimal rounding */
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: #ffffff;
      resize: vertical;
    }

    .field-row input::placeholder,
    .field-row textarea::placeholder {
      color: #7b8a9b;
      opacity: 0.8;
    }

    .field-row select {
      color: #ffffff;
      background: #1e242a;
    }

    .field-row select option {
      background: #23282e;
      color: #ffffff;
    }

    .field-row select optgroup {
      background: #23282e;
      color: #f39c12;
      font-weight: 600;
    }

    .field-row input:focus,
    .field-row select:focus,
    .field-row textarea:focus {
      border-color: #f39c12;
      outline: none;
    }

    /* badge hint - squared */
    .badge-hint {
      background: #1e242a;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 0.85rem;
      color: #f39c12;
      white-space: nowrap;
      border: 1px solid #3f4852;
      font-weight: 500;
    }
    .badge-hint i {
      color: #f39c12;
      margin-right: 4px;
    }

    /* nested rows - for grouped fields */
    .nested-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      background: #2d343b;
      padding: 16px;
      border-radius: 6px;
      border: 1px solid #3f4852;
    }

    /* divider - subtle orange */
    .section-divider {
      margin: 16px 0 8px;
      border: none;
      height: 2px;
      background: #3a424a;
    }

    .submit-area {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    /* MDC style button - squared, tactical */
    .submit-btn {
      background: #f39c12;
      border: none;
      color: #1a1e24;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px 40px;
      border-radius: 4px;    /* minimal rounding */
      cursor: pointer;
      box-shadow: 0 3px 0 #b1580e;
      transition: 0.05s linear;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid #f39c12;
    }

    .submit-btn i {
      font-size: 1.3rem;
    }

    .submit-btn:hover {
      background: #f5b041;
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #b1580e;
    }

    .submit-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #b1580e;
    }

    .response-message {
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 4px;
      background: #2d343b;
      border: 1px solid #3f4852;
      color: #e5e9f0;
    }

    .response-success {
      color: #ffffff;
      background: #2b5e3b;
      border-color: #f39c12;
    }
    .response-error {
      color: #ffffff;
      background: #712b1f;
      border-color: #f39c12;
    }

    footer {
      background: #23282e;
      padding: 12px;
      text-align: center;
      color: #8a9bb0;
      font-size: 0.85rem;
      border-top: 2px solid #f39c1230;
      margin-top: auto;
    }

    /* action block visibility */
    .action-block {
      display: none;
    }
    .action-block.visible {
      display: block;
    }

    /* parking subtype visibility */
    .parking-subtype-fields {
      display: none;
    }
    .parking-subtype-fields.visible {
      display: block;
    }

    @media (max-width: 800px) {
      .action-card { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo-area">
      <i class="fas fa-shield-alt logo-icon"></i>
      <div class="logo-text">
        <h1>LSCS· ACTIONS</h1>
      </div>
    </div>
    <div class="report-ref">
      <i class="fas fa-hashtag"></i> <span id="headerReportCode">LSCS-0000</span>
    </div>
  </div>
</header>

<main>
  <div class="action-card">
    <div class="form-header">
      <h2>
        <i class="fas fa-pen-to-square"></i> ACTION REPORT
      </h2>
      <p>INTERNAL REPORTING</p>
    </div>

    <form id="actionForm" class="form-container">
      <!-- UNIQUE REPORT CODE (readonly) -->
      <div class="field-row">
        <label><i class="fas fa-barcode"></i> REPORT CODE</label>
        <input type="text" id="reportCode" name="reportCode" readonly value="LSCS-0000" style="background:#1a1e24; font-weight:600; color:#f39c12;">

      <!-- ACTION TYPE DROPDOWN -->
      <div class="field-row">

          <option value="departmental">DEPARTMENTAL ACTION</option>

      <!-- PARKING ENFORCEMENT BLOCK -->
      <div id="parkingBlock" class="action-block">
        <div class="field-row">
          <label><i class="fas fa-exclamation-triangle"></i> ENFORCEMENT TYPE</label>
          <select id="parkingSubtype">
            <option value="" disabled selected>— SELECT —</option>
            <option value="impound">VEHICLE IMPOUND</option>
            <option value="ticket">VEHICLE TICKET</option>

        <!-- Impound Fields -->
        <div id="impoundFields" class="parking-subtype-fields">
          <div class="nested-rows">

            <div class="field-row">
              <label><i class="fas fa-gavel"></i> GUIDELINE</label>
              <select id="parkingImpoundGuideline">
                <option value="" disabled selected>— SELECT VIOLATION —</option>
                <optgroup label="MINOR VIOLATIONS">
                  <option value="P-101 - Expired Parking Meter - $150 - No Tow">P-101 - Expired Parking Meter - $150 - No Tow</option>
                  <option value="P-102 - Overtime in Time-Limited Zone - $200 - No Tow">P-102 - Overtime in Time-Limited Zone - $200 - No Tow</option>
                  <option value="P-103 - Parking Within 5ft of Driveway - $200 - No Tow">P-103 - Parking Within 5ft of Driveway - $200 - No Tow</option>
                  <option value="P-104 - Double Parking - $250 - No Tow">P-104 - Double Parking - $250 - No Tow</option>
                  <option value="P-105 - Parking Facing Wrong Direction - $250 - No Tow">P-105 - Parking Facing Wrong Direction - $250 - No Tow</option>
                  <option value="P-106 - Blocking Sidewalk - $300 - No Tow">P-106 - Blocking Sidewalk - $300 - No Tow</option>
                  <option value="P-107 - Parking Over Line - $200 - No Tow">P-107 - Parking Over Line - $200 - No Tow</option>
                  <option value="P-108 - Parking in No-Parking Zone - $300 - No Tow">P-108 - Parking in No-Parking Zone - $300 - No Tow</option>
                </optgroup>
                <optgroup label="MODERATE VIOLATIONS">
                  <option value="P-201 - Blocking Fire Hydrant - $500 - Discretionary Tow">P-201 - Blocking Fire Hydrant - $500 - Discretionary Tow</option>
                  <option value="P-202 - Blocking Emergency Access - $600 - Discretionary Tow">P-202 - Blocking Emergency Access - $600 - Discretionary Tow</option>
                  <option value="P-203 - Parking in Bus Stop - $450 - Discretionary Tow">P-203 - Parking in Bus Stop - $450 - Discretionary Tow</option>
                  <option value="P-204 - Unauthorized Loading Zone Parking - $400 - No Tow">P-204 - Unauthorized Loading Zone Parking - $400 - No Tow</option>
                  <option value="P-205 - Disabled Bay (No Permit) - $750 - Discretionary Tow">P-205 - Disabled Bay (No Permit) - $750 - Discretionary Tow</option>
                  <option value="P-206 - Government Restricted Zone - $600 - Discretionary Tow">P-206 - Government Restricted Zone - $600 - Discretionary Tow</option>
                  <option value="P-207 - Abandoned Vehicle - $700 - Immediate Tow">P-207 - Abandoned Vehicle - $700 - Immediate Tow</option>
                </optgroup>
                <optgroup label="MAJOR VIOLATIONS">
                  <option value="P-301 - Obstructing Traffic - $900 - Immediate Tow">P-301 - Obstructing Traffic - $900 - Immediate Tow</option>
                  <option value="P-302 - Parking on Railroad Crossing - $1,200 - Immediate Tow">P-302 - Parking on Railroad Crossing - $1,200 - Immediate Tow</option>
                  <option value="P-303 - Emergency Response Area - $1,000 - Immediate Tow">P-303 - Emergency Response Area - $1,000 - Immediate Tow</option>
                  <option value="P-304 - Repeat Offender (3+ Unpaid) - $1,500 - Immediate Tow">P-304 - Repeat Offender (3+ Unpaid) - $1,500 - Immediate Tow</option>
                  <option value="P-305 - Vehicle Deemed Hazardous - $1,000 - Immediate Tow">P-305 - Vehicle Deemed Hazardous - $1,000 - Immediate Tow</option>
                </optgroup>
              </select>
            </div>
            
            <div class="field-row"><label><i class="fas fa-car"></i> VEHICLE DESC</label><input type="text" id="parkingImpoundVehicle" placeholder="make/model/plate"></div>
            <div class="field-row"><label><i class="fas fa-camera"></i> EVIDENCE</label><textarea id="parkingImpoundEvidence" rows="1" placeholder="URL / reference"></textarea></div>
            <div class="field-row"><label><i class="fas fa-align-left"></i> FURTHER DETAILS</label><textarea id="parkingImpoundDetails" rows="1" placeholder="additional info"></textarea></div>
          </div>
        </div>

        <!-- Ticket Fields -->
        <div id="ticketFields" class="parking-subtype-fields">
          <div class="nested-rows">
            <div class="field-row"><label><i class="far fa-calendar-alt"></i> DATE/TIME</label><input type="datetime-local" id="parkingTicketDatetime"></div>
            <div class="field-row"><label><i class="fas fa-map-pin"></i> LOCATION</label><input type="text" id="parkingTicketLocation" placeholder="street/intersection"></div>
            
            <!-- GUIDELINE DROPDOWN for Ticket -->
            <div class="field-row">
              <label><i class="fas fa-gavel"></i> GUIDELINE</label>
              <select id="parkingTicketGuideline">
                <option value="" disabled selected>— SELECT VIOLATION —</option>
                <optgroup label="MINOR VIOLATIONS">
                  <option value="P-101 - Expired Parking Meter - $150 - No Tow">P-101 - Expired Parking Meter - $150 - No Tow</option>
                  <option value="P-102 - Overtime in Time-Limited Zone - $200 - No Tow">P-102 - Overtime in Time-Limited Zone - $200 - No Tow</option>
                  <option value="P-103 - Parking Within 5ft of Driveway - $200 - No Tow">P-103 - Parking Within 5ft of Driveway - $200 - No Tow</option>
                  <option value="P-104 - Double Parking - $250 - No Tow">P-104 - Double Parking - $250 - No Tow</option>
                  <option value="P-105 - Parking Facing Wrong Direction - $250 - No Tow">P-105 - Parking Facing Wrong Direction - $250 - No Tow</option>
                  <option value="P-106 - Blocking Sidewalk - $300 - No Tow">P-106 - Blocking Sidewalk - $300 - No Tow</option>
                  <option value="P-107 - Parking Over Line - $200 - No Tow">P-107 - Parking Over Line - $200 - No Tow</option>
                  <option value="P-108 - Parking in No-Parking Zone - $300 - No Tow">P-108 - Parking in No-Parking Zone - $300 - No Tow</option>
                </optgroup>
                <optgroup label="MODERATE VIOLATIONS">
                  <option value="P-201 - Blocking Fire Hydrant - $500 - Discretionary Tow">P-201 - Blocking Fire Hydrant - $500 - Discretionary Tow</option>
                  <option value="P-202 - Blocking Emergency Access - $600 - Discretionary Tow">P-202 - Blocking Emergency Access - $600 - Discretionary Tow</option>
                  <option value="P-203 - Parking in Bus Stop - $450 - Discretionary Tow">P-203 - Parking in Bus Stop - $450 - Discretionary Tow</option>
                  <option value="P-204 - Unauthorized Loading Zone Parking - $400 - No Tow">P-204 - Unauthorized Loading Zone Parking - $400 - No Tow</option>
                  <option value="P-205 - Disabled Bay (No Permit) - $750 - Discretionary Tow">P-205 - Disabled Bay (No Permit) - $750 - Discretionary Tow</option>
                  <option value="P-206 - Government Restricted Zone - $600 - Discretionary Tow">P-206 - Government Restricted Zone - $600 - Discretionary Tow</option>
                  <option value="P-207 - Abandoned Vehicle - $700 - Immediate Tow">P-207 - Abandoned Vehicle - $700 - Immediate Tow</option>
                </optgroup>
                <optgroup label="MAJOR VIOLATIONS">
                  <option value="P-301 - Obstructing Traffic - $900 - Immediate Tow">P-301 - Obstructing Traffic - $900 - Immediate Tow</option>
                  <option value="P-302 - Parking on Railroad Crossing - $1,200 - Immediate Tow">P-302 - Parking on Railroad Crossing - $1,200 - Immediate Tow</option>
                  <option value="P-303 - Emergency Response Area - $1,000 - Immediate Tow">P-303 - Emergency Response Area - $1,000 - Immediate Tow</option>
                  <option value="P-304 - Repeat Offender (3+ Unpaid) - $1,500 - Immediate Tow">P-304 - Repeat Offender (3+ Unpaid) - $1,500 - Immediate Tow</option>
                  <option value="P-305 - Vehicle Deemed Hazardous - $1,000 - Immediate Tow">P-305 - Vehicle Deemed Hazardous - $1,000 - Immediate Tow</option>
                </optgroup>
              </select>
            </div>
            
            <div class="field-row"><label><i class="fas fa-car"></i> VEHICLE DESC</label><input type="text" id="parkingTicketVehicle" placeholder="make/model/plate"></div>
            <div class="field-row"><label><i class="fas fa-camera"></i> EVIDENCE</label><textarea id="parkingTicketEvidence" rows="1" placeholder="URL / reference"></textarea></div>
            <div class="field-row"><label><i class="fas fa-align-left"></i> FURTHER DETAILS</label><textarea id="parkingTicketDetails" rows="1" placeholder="additional info"></textarea></div>
          </div>
        </div>
      </div>

      <!-- PUBLIC WORKS BLOCK -->
      <div id="publicworksBlock" class="action-block">
        <div class="nested-rows">
          <div class="field-row"><label><i class="far fa-calendar-alt"></i> DATE/TIME</label><input type="datetime-local" id="publicworksDatetime"></div>
          <div class="field-row"><label><i class="fas fa-map-pin"></i> LOCATION</label><input type="text" id="publicworksLocation" placeholder="street/district"></div>
          <div class="field-row"><label><i class="fas fa-broom"></i> ACTION DETAILS</label><textarea id="publicworksDetails" rows="2" placeholder="description of work"></textarea></div>
          <div class="field-row"><label><i class="fas fa-camera"></i> EVIDENCE</label><textarea id="publicworksEvidence" rows="1" placeholder="URL / reference"></textarea></div>
        </div>
      </div>

      <!-- DEPARTMENTAL ACTION BLOCK -->
      <div id="departmentalBlock" class="action-block">
        <div class="nested-rows">
          <div class="field-row"><label><i class="far fa-calendar-alt"></i> DATE/TIME</label><input type="datetime-local" id="departmentalDatetime"></div>
          <div class="field-row"><label><i class="fas fa-sticky-note"></i> ACTION DETAILS</label><textarea id="departmentalDetails" rows="3" placeholder="internal action description"></textarea></div>
        </div>
      </div>

      <!-- OPERATIVE & BADGE (always visible) -->
      <div class="field-row">
        <label><i class="fas fa-user-tie"></i> OPERATIVE</label>
        <input type="text" id="operativeName" placeholder="full name" required>
      </div>

      <div class="field-row">
        <label><i class="fas fa-id-badge"></i> BADGE</label>
        <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
          <span class="badge-hint"><i class="fas fa-lock"></i> CS</span>
          <input type="text" id="badgeNumber" placeholder="##" style="flex:1; min-width:80px;" required>
        </div>
      </div>

      <hr class="section-divider">

      <div class="submit-area">
        <div id="formResponse" class="response-message"></div>
        <button type="submit" class="submit-btn">
          <i class="fas fa-paper-plane"></i> SUBMIT
        </button>
      </div>
    </form>
  </div>
</main>

<footer>
  <i class="fas fa-shield"></i> LSCS MOBILE DATA COMPUTER · v.3
</footer>

<script>
  (function() {
    const form = document.getElementById('actionForm');
    const responseDiv = document.getElementById('formResponse');
    const actionType = document.getElementById('actionType');
    const headerCodeSpan = document.getElementById('headerReportCode');
    const reportCodeInput = document.getElementById('reportCode');

    const parkingBlock = document.getElementById('parkingBlock');
    const publicworksBlock = document.getElementById('publicworksBlock');
    const departmentalBlock = document.getElementById('departmentalBlock');
    
    const parkingSubtype = document.getElementById('parkingSubtype');
    const impoundFields = document.getElementById('impoundFields');
    const ticketFields = document.getElementById('ticketFields');

    // Your webhooks
    const WEBHOOK_PARKING = 'https://discord.com/api/webhooks/1475979734377693307/2xtdfsR9wPRwNbCc4a8SPVqsnr4Bsc0B2W-ITDN6-k4XAjQb4mSGfXLXkM7Y7EgqT9f0';
    const WEBHOOK_PUBLICWORKS = 'https://discord.com/api/webhooks/1477778745850073291/kSqwt0eupya4JudHq7atM7RUDvzZPpEWeE0vnEgKXZFDr-LlfF-ikiPshs3jdMHX4VGq';
    const WEBHOOK_DEPARTMENTAL = 'https://discord.com/api/webhooks/1477778858261614644/TuFYB_tHSV3qFE7oh2gL5coSJlyg9_5hShcL0FMuEGeC-9ZnL89uvxsRpIaD3PNNhV0w';

    function randomLSCScode() {
      const rand = Math.floor(Math.random() * 9000 + 1000);
      return `LSCS-${rand}`;
    }
    
    function setNewCode() {
      const code = randomLSCScode();
      reportCodeInput.value = code;
      headerCodeSpan.textContent = code;
    }
    setNewCode();

    function setDefaultDatetimes() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2,'0');
      const day = String(now.getDate()).padStart(2,'0');
      const hours = String(now.getHours()).padStart(2,'0');
      const minutes = String(now.getMinutes()).padStart(2,'0');
      const value = `${year}-${month}-${day}T${hours}:${minutes}`;
      
      ['parkingImpoundDatetime','parkingTicketDatetime','publicworksDatetime','departmentalDatetime'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = value;
      });
    }
    setDefaultDatetimes();

    function updateMainVisibility() {
      const val = actionType.value;
      parkingBlock.classList.remove('visible');
      publicworksBlock.classList.remove('visible');
      departmentalBlock.classList.remove('visible');
      impoundFields.classList.remove('visible');
      ticketFields.classList.remove('visible');
      if (parkingSubtype) parkingSubtype.value = '';

      if (val === 'parking') parkingBlock.classList.add('visible');
      else if (val === 'publicworks') publicworksBlock.classList.add('visible');
      else if (val === 'departmental') departmentalBlock.classList.add('visible');
    }
    
    actionType.addEventListener('change', updateMainVisibility);
    updateMainVisibility();

    parkingSubtype.addEventListener('change', function() {
      const sub = this.value;
      impoundFields.classList.remove('visible');
      ticketFields.classList.remove('visible');
      if (sub === 'impound') impoundFields.classList.add('visible');
      else if (sub === 'ticket') ticketFields.classList.add('visible');
    });

    function formatBadge(raw) {
      return `CS-${raw.padStart(2,'0').slice(0,2)}`;
    }

    // Helper to format datetime for Discord
    function formatDateTime(datetimeString) {
      if (!datetimeString) return 'Not specified';
      const date = new Date(datetimeString);
      return date.toLocaleString('en-US', { 
        month: 'short', 
        day: 'numeric', 
        year: 'numeric',
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true 
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      responseDiv.textContent = '';
      responseDiv.className = 'response-message';

      const mainType = actionType.value;
      if (!mainType) {
        responseDiv.textContent = '❌ SELECT ACTION TYPE';
        responseDiv.classList.add('response-error');
        return;
      }

      const operative = document.getElementById('operativeName').value.trim();
      const badgeRaw = document.getElementById('badgeNumber').value.trim();
      if (!operative || !badgeRaw) {
        responseDiv.textContent = '❌ OPERATIVE & BADGE REQUIRED';
        responseDiv.classList.add('response-error');
        return;
      }
      const badgeFull = formatBadge(badgeRaw);

      let fields = [];
      let targetWebhook = '';
      let reportTitle = '';

      // Add report code as first field (inline false = full width)
      fields.push({ name: '📋 **REPORT CODE**', value: reportCodeInput.value, inline: false });

      if (mainType === 'parking') {
        const sub = parkingSubtype.value;
        if (!sub) {
          responseDiv.textContent = '❌ SELECT IMPOUND OR TICKET';
          responseDiv.classList.add('response-error');
          return;
        }

        // Set title based on subtype
        reportTitle = sub === 'impound' ? '🚨 **VEHICLE IMPOUND REPORT**' : '📄 **VEHICLE TICKET REPORT**';

        let dt, loc, guide, vehicle, evidence, details;
        if (sub === 'impound') {
          dt = document.getElementById('parkingImpoundDatetime').value;
          loc = document.getElementById('parkingImpoundLocation').value.trim();
          guide = document.getElementById('parkingImpoundGuideline').value;
          vehicle = document.getElementById('parkingImpoundVehicle').value.trim();
          evidence = document.getElementById('parkingImpoundEvidence').value.trim();
          details = document.getElementById('parkingImpoundDetails').value.trim();
        } else {
          dt = document.getElementById('parkingTicketDatetime').value;
          loc = document.getElementById('parkingTicketLocation').value.trim();
          guide = document.getElementById('parkingTicketGuideline').value;
          vehicle = document.getElementById('parkingTicketVehicle').value.trim();
          evidence = document.getElementById('parkingTicketEvidence').value.trim();
          details = document.getElementById('parkingTicketDetails').value.trim();
        }

        if (!dt || !loc || !guide || !vehicle || !evidence || !details) {
          responseDiv.textContent = '❌ FILL ALL PARKING FIELDS';
          responseDiv.classList.add('response-error');
          return;
        }

        // All fields with inline: false for single column
        fields.push({ name: '📅 **DATE & TIME**', value: formatDateTime(dt), inline: false });
        fields.push({ name: '📍 **LOCATION**', value: loc, inline: false });
        fields.push({ name: '⚖️ **GUIDELINE**', value: guide, inline: false });
        fields.push({ name: '🚗 **VEHICLE DESCRIPTION**', value: vehicle, inline: false });
        fields.push({ name: '📸 **EVIDENCE**', value: evidence || 'No evidence provided', inline: false });
        fields.push({ name: '📝 **FURTHER DETAILS**', value: details || 'No additional details', inline: false });

        targetWebhook = WEBHOOK_PARKING;
      }
      else if (mainType === 'publicworks') {
        reportTitle = '🛠️ **PUBLIC WORKS REPORT**';
        
        const dt = document.getElementById('publicworksDatetime').value;
        const loc = document.getElementById('publicworksLocation').value.trim();
        const details = document.getElementById('publicworksDetails').value.trim();
        const evidence = document.getElementById('publicworksEvidence').value.trim();

        if (!dt || !loc || !details || !evidence) {
          responseDiv.textContent = '❌ FILL ALL PUBLIC WORKS FIELDS';
          responseDiv.classList.add('response-error');
          return;
        }

        fields.push({ name: '📅 **DATE & TIME**', value: formatDateTime(dt), inline: false });
        fields.push({ name: '📍 **LOCATION**', value: loc, inline: false });
        fields.push({ name: '🔨 **ACTION DETAILS**', value: details, inline: false });
        fields.push({ name: '📸 **EVIDENCE**', value: evidence || 'No evidence provided', inline: false });

        targetWebhook = WEBHOOK_PUBLICWORKS;
      }
      else if (mainType === 'departmental') {
        reportTitle = '📋 **DEPARTMENTAL ACTION REPORT**';
        
        const dt = document.getElementById('departmentalDatetime').value;
        const details = document.getElementById('departmentalDetails').value.trim();

        if (!dt || !details) {
          responseDiv.textContent = '❌ FILL DATE/TIME AND DETAILS';
          responseDiv.classList.add('response-error');
          return;
        }

        fields.push({ name: '📅 **DATE & TIME**', value: formatDateTime(dt), inline: false });
        fields.push({ name: '📝 **ACTION DETAILS**', value: details, inline: false });

        targetWebhook = WEBHOOK_DEPARTMENTAL;
      }

      // Add operative and badge to all reports
      fields.push({ name: '👮 **OPERATIVE**', value: operative, inline: false });
      fields.push({ name: '🪪 **BADGE NUMBER**', value: badgeFull, inline: false });

      const embed = {
        title: reportTitle || 'LSCS ACTION REPORT',
        color: 0xf39c12,
        fields: fields,
        footer: { text: '🏛️ Los Santos City Services · MDC v.3' },
        timestamp: new Date().toISOString()
      };

      try {
        const res = await fetch(targetWebhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ embeds: [embed] })
        });

        if (res.ok) {
          responseDiv.textContent = '✅ **REPORT TRANSMITTED SUCCESSFULLY!**';
          responseDiv.classList.add('response-success');
          form.reset();
          setNewCode();
          setDefaultDatetimes();
          parkingBlock.classList.remove('visible');
          publicworksBlock.classList.remove('visible');
          departmentalBlock.classList.remove('visible');
          impoundFields.classList.remove('visible');
          ticketFields.classList.remove('visible');
          actionType.value = '';
        } else {
          throw new Error(`HTTP ${res.status}`);
        }
      } catch (err) {
        responseDiv.textContent = '❌ **TRANSMISSION ERROR - CHECK CONNECTION**';
        responseDiv.classList.add('response-error');
        console.error(err);
      }
    });
  })();
</script>
</body>
</html>
